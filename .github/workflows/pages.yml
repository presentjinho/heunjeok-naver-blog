name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ci
  deploy:
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - name: Prepare static site
        shell: bash
        run: |
          mkdir _site
          cp index.html guide.html privacy.html security.html favicon.svg favicon.ico apple-touch-icon.png og.png og-card.svg manifest.webmanifest *.css app.js core.js history.js photo-vault.js quality.js assemble.js improve-ui.js postlog.js postlog-ui.js daily.js daily-ui.js backup.js product-v2.js fold-ui.js polish-ui.js defer-tools.js _site/
          BUILD_SHA="${GITHUB_SHA::7}"
          sed -E -i "s/\?v=[A-Za-z0-9._-]+/?v=${BUILD_SHA}/g; s/(name=\"heunjeok-build\" content=\")[^\"]+/\1${BUILD_SHA}/" _site/index.html
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
